<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Pronunciation Star! 🌟</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Grandstander:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- GLOBAL STYLES --- */
        body {
            font-family: 'Grandstander', cursive;
            background-color: #e0f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #4a4a4a;
        }

        .app-container {
            background-color: #ffffff;
            width: 90%;
            max-width: 600px;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        .warning-banner {
            display: none;
            background-color: #ffebee;
            color: #c62828;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 2px solid #ef9a9a;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #ff9fb8;
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        p.subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .progress-indicator {
            color: #00796b;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 25px;
            background: #e0f2f1;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
        }

        /* --- CHIBI BUNNY (CSS Drawing) --- */
        .chibi-bunny {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
        }

        .ear {
            width: 25px;
            height: 60px;
            background-color: #fff;
            border: 4px solid #ff9fb8;
            border-radius: 50% 50% 0 0;
            position: absolute;
            top: -30px;
            z-index: 1;
            transition: all 0.3s;
        }

        .ear.left { left: 20px; transform: rotate(-15deg); }
        .ear.right { right: 20px; transform: rotate(15deg); }

        .head {
            width: 90px;
            height: 80px;
            background-color: #fff;
            border: 4px solid #ff9fb8;
            border-radius: 40px;
            position: absolute;
            bottom: 0;
            left: 11px;
            z-index: 2;
        }

        .eye {
            width: 8px;
            height: 8px;
            background-color: #333;
            border-radius: 50%;
            position: absolute;
            top: 35px;
        }

        .eye.left { left: 25px; }
        .eye.right { right: 25px; }

        .blush {
            width: 15px;
            height: 8px;
            background-color: #ffcce0;
            border-radius: 50%;
            position: absolute;
            top: 45px;
        }

        .blush.left { left: 10px; }
        .blush.right { right: 10px; }

        .nose {
            width: 10px;
            height: 6px;
            background-color: #ff9fb8;
            border-radius: 50%;
            position: absolute;
            top: 45px;
            left: 36px;
        }

        @keyframes flapEar {
            0%, 100% { transform: rotate(-15deg); }
            50% { transform: rotate(-30deg); }
        }
        @keyframes blink {
            0%, 90%, 100% { height: 8px; transform: translateY(0); }
            95% { height: 2px; transform: translateY(3px); }
        }

        .is-recording .ear.left { animation: flapEar 0.5s infinite; }
        .is-recording .eye { animation: blink 2s infinite; }

        /* --- SPEECH BUBBLE --- */
        .speech-bubble {
            background-color: #fffacd;
            border-radius: 20px;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 600;
            position: relative;
            margin-bottom: 30px;
            border: 3px dashed #ffd700;
            line-height: 1.5;
        }

        .speech-bubble::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 15px 15px 15px;
            border-style: solid;
            border-color: transparent transparent #fffacd transparent;
        }

        .stress {
            background-color: #ff9fb8;
            color: white;
            padding: 2px 6px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            transform: scale(1.1);
        }

        /* --- BUTTONS --- */
        .lollipop-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 154, 158, 0.4);
            transition: all 0.2s;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            margin: 0 auto;
        }

        .lollipop-btn::after {
            content: '';
            position: absolute;
            bottom: -20px;
            width: 8px;
            height: 30px;
            background-color: #dcdcdc;
            border-radius: 4px;
            z-index: -1;
        }

        .lollipop-btn:active:not(:disabled) { transform: scale(0.9); }
        .is-recording .lollipop-btn { box-shadow: 0 0 20px 10px #ff9a9e; }
        
        /* Disabled State for Mic */
        .lollipop-btn:disabled {
            filter: grayscale(0.8);
            cursor: not-allowed;
            box-shadow: none;
        }

        .action-btns-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .action-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            padding: 12px 25px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            display: none; /* Hidden by default */
            transition: transform 0.1s;
        }

        .action-btn:active {
            transform: translateY(5px);
            box-shadow: none !important;
        }

        .next-btn {
            background-color: #a0e8af;
            color: #2c5e37;
            box-shadow: 0 5px 0 #7bcc8a;
        }

        .try-again-btn {
            background-color: #ffcc80;
            color: #e65100;
            box-shadow: 0 5px 0 #ffa726;
        }

        /* --- RESULTS & FEEDBACK --- */
        #status {
            margin-top: 15px;
            font-weight: bold;
            color: #ff9fb8;
            min-height: 24px;
        }

        .stars-container {
            font-size: 2.5rem;
            margin: 10px 0;
            color: #ffd700;
            min-height: 48px;
        }

        .word-correct { color: #4caf50; font-weight: bold; }
        .word-wrong { color: #e57373; font-weight: bold; text-decoration: underline; }

        .feedback-panel {
            background-color: #fce4ec;
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            display: none;
            font-size: 1.1rem;
        }

        .feedback-item {
            background-color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #ff9fb8;
        }

        .ipa-text { color: #00796b; font-weight: bold; font-family: sans-serif;}
    </style>
</head>
<body>

<div class="app-container">
    <div id="warning-banner" class="warning-banner"></div>

    <h1>Super Speaker! 🎤</h1>
    <p class="subtitle">Read the sentence loud and clear.</p>
    <div id="progress-indicator" class="progress-indicator">Sentence 0 of 0</div>

    <div class="chibi-bunny" id="bunny">
        <div class="ear left"></div>
        <div class="ear right"></div>
        <div class="head">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="blush left"></div>
            <div class="blush right"></div>
            <div class="nose"></div>
        </div>
    </div>

    <div class="speech-bubble" id="sentence-display">
        Loading...
    </div>

    <button class="lollipop-btn" id="mic-btn" onclick="startRecording()" title="Click to speak!">🎙️</button>
    <div id="status">Click the microphone to start!</div>

    <div class="stars-container" id="stars-display"></div>
    <div id="result-text"></div>

    <div class="feedback-panel" id="feedback-panel">
        <strong style="color: #d81b60;">Oops! Let's check these words:</strong>
        <div id="feedback-list"></div>
    </div>

    <div class="action-btns-container">
        <button class="action-btn try-again-btn" id="try-again-btn" onclick="startRecording()">Try Again 🔄</button>
        <button class="action-btn next-btn" id="next-btn" onclick="nextSentence()">Next Sentence 🚀</button>
    </div>
</div>

<script>
    // --- DATA ARRAY ---
    const practiceData = [
        {
            original: "Nuclear 'energy is 'dangerous and ex'pensive.",
            hardWords: {
                "nuclear": "/ˈnjuːkliər/",
                "energy": "/ˈenərdʒi/",
                "dangerous": "/ˈdeɪndʒərəs/",
                "expensive": "/ɪkˈspensɪv/"
            }
        },
        {
            original: "We should ride a bike when 'travelling short 'distances.",
            hardWords: {
                "travelling": "/ˈtrævəlɪŋ/",
                "distances": "/ˈdɪstənsɪz/"
            }
        },
        {
            original: "The word re'cycle has three 'syllables.",
            hardWords: {
                "recycle": "/ˌriːˈsaɪkl/",
                "syllables": "/ˈsɪləblz/"
            }
        },
        {
            original: "Burning coal is po'lluting our environment.",
            hardWords: {
                "polluting": "/pəˈluːtɪŋ/",
                "environment": "/ɪnˈvaɪrənmənt/"
            }
        },
        {
            original: "Our 'government is looking for new sources of 'energy to replace gas.",
            hardWords: {
                "government": "/ˈɡʌvərnmənt/",
                "sources": "/ˈsɔːrsɪz/",
                "energy": "/ˈenərdʒi/"
            }
        }
    ];

    // --- VARIABLES ---
    let currentSentenceData = null;
    let unplayedIndices = [];
    let currentSentenceNumber = 0;
    
    // Environment Checks
    const isLocalhost = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
    const isSecure = window.location.protocol === "https:" || isLocalhost;
    const warningBanner = document.getElementById("warning-banner");

    // Setup Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        
        if (!isSecure) {
             warningBanner.style.display = "block";
             warningBanner.innerText = "⚠️ Speech Recognition requires a secure connection. Please load this page using HTTPS or localhost!";
        }
    } else {
        warningBanner.style.display = "block";
        warningBanner.innerText = "⚠️ Oops! Your browser doesn't support Voice Recording. Please use Google Chrome or Edge!";
    }

    // --- LOGIC FUNCTIONS ---

    // 1. Initialize the playlist so we can track progress without repeating early
    function initPlaylist() {
        unplayedIndices = practiceData.map((_, index) => index);
        // Optional: Shuffle the array here if you want randomized order
        unplayedIndices.sort(() => Math.random() - 0.5); 
        currentSentenceNumber = 0;
    }

    // 2. Load and show the sentence
    function loadSentence() {
        if (unplayedIndices.length === 0) {
            initPlaylist(); // Restart if they've done them all
        }
        
        const nextIndex = unplayedIndices.pop();
        currentSentenceData = practiceData[nextIndex];
        currentSentenceNumber++;

        // Update Progress Indicator
        document.getElementById("progress-indicator").innerText = `Sentence ${currentSentenceNumber} of ${practiceData.length}`;

        let formattedText = currentSentenceData.original.replace(/'([a-zA-Z]+)/g, "<span class='stress'>$1</span>");
        
        document.getElementById("sentence-display").innerHTML = formattedText;
        
        // Reset UI completely
        document.getElementById("status").innerText = "Click the microphone to start!";
        document.getElementById("result-text").innerHTML = "";
        document.getElementById("stars-display").innerHTML = "";
        document.getElementById("feedback-panel").style.display = "none";
        document.getElementById("feedback-list").innerHTML = "";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("try-again-btn").style.display = "none";
        document.getElementById("mic-btn").disabled = false;
    }

    // 3. Start listening to voice
    function startRecording() {
        if (!recognition || (!isSecure && !isLocalhost)) {
            alert("Speech recognition is disabled due to browser or security limitations.");
            return;
        }

        const micBtn = document.getElementById("mic-btn");
        micBtn.disabled = true; // Disable visually and functionally

        document.getElementById("bunny").classList.add("is-recording");
        document.getElementById("status").innerText = "Listening... Speak clearly! 🐰";
        document.getElementById("result-text").innerHTML = "";
        document.getElementById("stars-display").innerHTML = "";
        document.getElementById("feedback-panel").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("try-again-btn").style.display = "none";

        try {
            recognition.start();
        } catch(e) {
            // Catch already started errors, reset UI if needed
            micBtn.disabled = false;
            document.getElementById("bunny").classList.remove("is-recording");
        }
    }

    // 4. When speech is recognized
    if (recognition) {
        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            document.getElementById("status").innerText = "Checking your voice... 🕵️‍♀️";
            document.getElementById("bunny").classList.remove("is-recording");
            document.getElementById("mic-btn").disabled = false; // Re-enable mic
            
            checkPronunciation(transcript);
        };

        recognition.onerror = function(event) {
            document.getElementById("bunny").classList.remove("is-recording");
            document.getElementById("mic-btn").disabled = false; // Re-enable mic
            
            if (event.error === 'no-speech') {
                document.getElementById("status").innerText = "I didn't hear anything. Try again! 🎤";
            } else {
                document.getElementById("status").innerText = "Something went wrong. Please try again! 🎤";
            }
            document.getElementById("try-again-btn").style.display = "inline-block";
        };
    }

    // Cleans a word for strict text matching (removes punctuation but not intra-word hyphens if you had them)
    function cleanWord(word) {
        // Only strip literal punctuation, protecting standard word characters
        return word.replace(/[.,?!'"]/g, "").toLowerCase().trim();
    }

    // 5. Compare words and give score
    function checkPronunciation(transcript) {
        // Use Regex \s+ to split safely in case of multiple spaces, filter out empty strings
        let originalWordsArray = currentSentenceData.original.split(/\s+/).filter(w => w.length > 0);
        let spokenWordsArray = transcript.split(/\s+/).filter(w => w.length > 0);
        
        let correctCount = 0;
        let resultHTML = "";
        let mistakes = [];

        originalWordsArray.forEach(origWord => {
            let cleanOrig = cleanWord(origWord);
            
            let foundIndex = spokenWordsArray.findIndex(spokenWord => cleanWord(spokenWord) === cleanOrig);

            if (foundIndex !== -1) {
                correctCount++;
                // Global replace /'/g instead of just the first occurrence
                resultHTML += `<span class="word-correct">${origWord.replace(/'/g, '')}</span> `;
                spokenWordsArray.splice(foundIndex, 1);
            } else {
                mistakes.push(origWord);
                resultHTML += `<span class="word-wrong">${origWord.replace(/'/g, '')}</span> `;
            }
        });

        document.getElementById("result-text").innerHTML = `<br><strong>Your reading:</strong><br>${resultHTML}`;

        let percentage = correctCount / originalWordsArray.length;
        let stars = "";
        let feedbackMsg = "";

        if (percentage >= 0.9) {
            stars = "⭐⭐⭐⭐⭐"; feedbackMsg = "Perfect! You are a Superstar! 🌟";
        } else if (percentage >= 0.7) {
            stars = "⭐⭐⭐⭐"; feedbackMsg = "Great job! Almost perfect! ✨";
        } else if (percentage >= 0.5) {
            stars = "⭐⭐⭐"; feedbackMsg = "Good try! Keep practicing! 💪";
        } else {
            stars = "⭐⭐"; feedbackMsg = "Don't give up! Let's try again! 🐰";
        }

        document.getElementById("stars-display").innerHTML = stars;
        document.getElementById("status").innerText = feedbackMsg;

        generateFeedbackPanel(mistakes);

        // Show Buttons based on success
        if (percentage >= 0.9) {
            document.getElementById("next-btn").style.display = "inline-block";
            document.getElementById("try-again-btn").style.display = "none";
        } else {
            document.getElementById("next-btn").style.display = "inline-block"; // Still let them skip
            document.getElementById("try-again-btn").style.display = "inline-block"; // Let them retry
        }
    }

    // 6. Show detailed feedback for hard words
    function generateFeedbackPanel(mistakes) {
        let feedbackHTML = "";
        let hardWordsDictionary = currentSentenceData.hardWords;

        mistakes.forEach(mistakeWord => {
            let cleanMistake = cleanWord(mistakeWord);
            
            if (hardWordsDictionary[cleanMistake]) {
                let ipa = hardWordsDictionary[cleanMistake];
                let hasStress = mistakeWord.includes("'");
                
                feedbackHTML += `
                    <div class="feedback-item">
                        <strong>${cleanMistake}</strong> <span class="ipa-text">${ipa}</span>
                        <br>
                        👉 <em>Pay attention to the ending sound or pronunciation!</em>
                        ${hasStress ? `<br>⚠️ <strong>Hint:</strong> Don't forget the stress mark on this word!` : ""}
                    </div>
                `;
            }
        });

        if (feedbackHTML !== "") {
            document.getElementById("feedback-panel").style.display = "block";
            document.getElementById("feedback-list").innerHTML = feedbackHTML;
        }
    }

    // 7. Go to next sentence
    function nextSentence() {
        loadSentence();
    }

    // Start the app when the page loads
    window.onload = function() {
        initPlaylist();
        loadSentence();
    };

</script>
</body>
</html>
